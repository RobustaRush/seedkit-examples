[project]
name = "05-orbit-demo"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "django>=6.0,<7.0",
    "django-environ>=0.13.0",
]

[dependency-groups]
dev = [
    "django-orbit[mcp]>=0.8.1",
    "ruff>=0.15.12",
]

[tool.ruff]
line-length = 100
extend-exclude = ["migrations", "*/migrations/*"]

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "UP",       # pyupgrade
    "B",        # flake8-bugbear
    "DJ",       # flake8-django
    "S",        # flake8-bandit
    "SIM",      # flake8-simplify
    "RUF",
]
ignore = [
    "E501",     # line length — formatter handles it
    "S101",     # assert — fine in tests
    "RUF012",   # mutable class attrs — Django idiom
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**"   = ["S"]
"**/test_*.py"  = ["S"]
"**/tests.py"   = ["S"]
"**/settings*.py" = ["F405", "F403", "S105", "S106"]

[tool.ruff.lint.isort]
known-first-party = ["pages", "config"]

[tool.ruff.format]
quote-style = "double"
