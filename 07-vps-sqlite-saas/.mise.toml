[tools]
python = "3.12"

[tasks.dev]
description = "Run development server"
run = "uv run manage.py runserver"

[tasks.migrate]
description = "Run database migrations"
run = "uv run manage.py migrate && uv run manage.py createcachetable --database cache"

[tasks.test]
description = "Run test suite"
run = "uv run pytest"

[tasks.lint]
description = "Lint and format"
run = "uv run ruff check . && uv run ruff format --check ."

[tasks.typecheck]
description = "Run pyright type checker"
run = "uv run pyright"

[tasks.shell]
description = "Django shell"
run = "uv run manage.py shell"

[tasks.makemigrations]
description = "Create new migrations"
run = "uv run manage.py makemigrations"
