services:
  django:
    image: ghcr.io/your-org/07-vps-sqlite-saas:latest
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      django:
        condition: service_healthy

volumes:
  data:
  caddy_data:
  caddy_config:
