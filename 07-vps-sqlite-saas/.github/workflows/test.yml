name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:////tmp/ci.sqlite3
      CACHE_DB_PATH: /tmp/ci-cache.sqlite3
      DJANGO_SECRET_KEY: test-key-ci-only
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      EMAIL_URL: consolemail://
      DEFAULT_FROM_EMAIL: test@example.com
      SERVER_EMAIL: test@example.com
      DJANGO_ADMINS: ""
      DJANGO_SITE_DOMAIN: localhost
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run ruff check .
      - run: uv run ruff format --check .

      - run: uv run manage.py check --deploy --fail-level WARNING
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          DJANGO_CSRF_TRUSTED_ORIGINS: https://example.com
          DJANGO_BEHIND_PROXY: "False"

      - run: uv run pyright

      - run: uv run pytest
