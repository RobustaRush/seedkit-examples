services:
  web:
    image: ghcr.io/robustarush/07-vps-sqlite-saas:latest
    restart: unless-stopped
    env_file: ../.env.prod
    volumes:
      - sqlite_data:/data
      - media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/healthz\",timeout=2).status==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - media:/srv/media:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
  media:
