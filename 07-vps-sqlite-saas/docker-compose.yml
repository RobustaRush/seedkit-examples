services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/.venv
      - sqlite_data:/data
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/site.sqlite3
      CACHE_DB_PATH: /data/cache.sqlite3
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/healthz\",timeout=2).status==200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlite_data:
