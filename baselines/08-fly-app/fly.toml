app = "08-fly-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DJANGO_BEHIND_PROXY = "True"

# Secrets (set via `fly secrets set`):
#   DJANGO_SECRET_KEY
#   DJANGO_ALLOWED_HOSTS
#   DJANGO_CSRF_TRUSTED_ORIGINS
#   DATABASE_URL         — auto-set by `fly postgres attach`
#   REDIS_URL            — auto-set by `fly redis attach`
#   POSTMARK_SERVER_TOKEN
#   ANYMAIL_WEBHOOK_SECRET
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_STORAGE_BUCKET_NAME
#   AWS_S3_ENDPOINT_URL
#   DEFAULT_FROM_EMAIL
#   SERVER_EMAIL
#   SENTRY_DSN

[deploy]
  # `python` not `uv run` — the slim runtime image has no uv binary.
  # collectstatic uploads to S3 bucket; migrate runs first.
  release_command = "python manage.py migrate && python manage.py collectstatic --noinput"

[processes]
  web    = "gunicorn config.wsgi --bind 0.0.0.0:8000"
  worker = "celery -A config worker -l info"
  bolt   = "env DJANGO_SETTINGS_MODULE=config.settings.bolt python manage.py runbolt --port 8002"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    path = "/readyz"
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"

[[services]]
  internal_port = 8002
  protocol = "tcp"
  processes = ["bolt"]

  [[services.ports]]
    port = 8443
    handlers = ["tls", "http"]
