services:
  web:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}
      SERVER_EMAIL: ${SERVER_EMAIL:-errors@example.com}
      DJANGO_ADMINS: ${DJANGO_ADMINS:-}
      EMAIL_URL: ${EMAIL_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      MFA_TOTP_ISSUER: ${MFA_TOTP_ISSUER:-vps-sqlite-saas}
      LITESTREAM_REPLICA_URL: ${LITESTREAM_REPLICA_URL}
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    volumes:
      - sqlite_data:/data
      - media_data:/app/media
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ht/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  sqlite_data:
  media_data:
  caddy_data:
  caddy_config:
