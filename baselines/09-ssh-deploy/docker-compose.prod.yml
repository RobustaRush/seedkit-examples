services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ssh_deploy}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-org/09-ssh-deploy}:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backups:/backups
    depends_on:
      - db
      - redis

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-org/09-ssh-deploy}:latest
    restart: unless-stopped
    command: ["python", "manage.py", "rqworker", "default"]
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  backups:
