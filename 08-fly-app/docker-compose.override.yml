services:
  web:
    build:
      target: dev
    volumes:
      - .:/app
      - /app/.venv
    environment:
      DJANGO_DEBUG: "True"

  worker:
    build:
      target: dev
    volumes:
      - .:/app
      - /app/.venv
    environment:
      DJANGO_DEBUG: "True"

  db:
    ports:
      - "127.0.0.1:15432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
