app = "08-fly-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    target = "prod"

[env]
  PORT = "8000"
  DJANGO_BEHIND_PROXY = "True"
# Required secrets — set via `fly secrets set`:
#   DJANGO_SECRET_KEY        — secrets.token_urlsafe(50)
#   DJANGO_ALLOWED_HOSTS     — your-app.fly.dev,custom-domain.com
#   DJANGO_CSRF_TRUSTED_ORIGINS — https://your-app.fly.dev
#   DATABASE_URL             — auto-set by `fly postgres attach`
#   REDIS_URL                — auto-set by `fly redis attach`
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_STORAGE_BUCKET_NAME
#   AWS_S3_ENDPOINT_URL      — for non-AWS providers
#   DEFAULT_FROM_EMAIL
#   POSTMARK_SERVER_TOKEN
#   ANYMAIL_WEBHOOK_SECRET
#   SENTRY_DSN               — if error reporting is configured

[deploy]
  release_command = "python manage.py migrate && python manage.py collectstatic --noinput"

[processes]
  web = "gunicorn config.wsgi --bind 0.0.0.0:8000"
  worker = "celery -A config worker -l info"
  bolt = "env DJANGO_SETTINGS_MODULE=config.settings.bolt python manage.py runbolt --port 8002"

[[services]]
  internal_port = 8000
  processes = ["web"]
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[checks]]
  name = "readyz"
  port = 8000
  type = "http"
  interval = "10s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/readyz"
