app = "08-fly-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  target = "prod"

[env]
  PORT = "8000"
  DJANGO_SETTINGS_MODULE = "config.settings.production"

[processes]
  web    = "gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
  worker = "celery -A config worker -l info --concurrency 2"
  bolt   = "python manage.py runbolt --port 8001"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "2s"
  path = "/healthz"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["web", "worker", "bolt"]

[deploy]
  release_command = "python manage.py migrate --noinput"
