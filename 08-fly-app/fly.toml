app = "08-fly-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  target = "prod"

[env]
  PORT = "8000"
  DJANGO_SETTINGS_MODULE = "config.settings.production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  web = "gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
  worker = "celery -A config worker -l info --concurrency 2"
  bolt = "python manage.py runbolt --host 0.0.0.0 --port 8001"

[processes.bolt.env]
  DJANGO_SETTINGS_MODULE = "config.settings.bolt"

[[services]]
  protocol = "tcp"
  internal_port = 8001
  processes = ["bolt"]

  [[services.ports]]
    port = 8001

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    port = 8000
    timeout = "5s"
    type = "http"
