app = "08-fly-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DJANGO_BEHIND_PROXY = "True"

# Required secrets — set with `fly secrets set`:
#   DJANGO_SECRET_KEY
#   DJANGO_ALLOWED_HOSTS     (e.g. "08-fly-app.fly.dev,example.com")
#   DJANGO_CSRF_TRUSTED_ORIGINS  (e.g. "https://08-fly-app.fly.dev")
#   DATABASE_URL             (auto-set by `fly postgres attach`)
#   REDIS_URL                (auto-set by `fly redis attach`)
#   DEFAULT_FROM_EMAIL
#   POSTMARK_SERVER_TOKEN
#   ANYMAIL_WEBHOOK_SECRET
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_STORAGE_BUCKET_NAME
#   SENTRY_DSN

[processes]
  web    = "gunicorn config.wsgi --bind 0.0.0.0:8000"
  worker = "celery -A config worker -l info"
  bolt   = "env DJANGO_SETTINGS_MODULE=config.settings.bolt python manage.py runbolt --port 8002"

[deploy]
  # python not uv run — runtime stage has no uv binary, only the venv on PATH.
  # collectstatic uploads to S3 with real credentials from fly secrets.
  release_command = "python manage.py migrate && python manage.py collectstatic --noinput"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    path = "/readyz"
    interval = "10s"
    timeout = "2s"

[[services]]
  internal_port = 8002
  protocol = "tcp"
  processes = ["bolt"]

  [[services.ports]]
    port = 8443
    handlers = ["tls", "http"]
