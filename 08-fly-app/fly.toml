app = "08-fly-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  target = "prod"

[env]
  PORT = "8000"
  DJANGO_BEHIND_PROXY = "True"

[deploy]
  release_command = "python manage.py migrate && python manage.py collectstatic --noinput"

[processes]
  web    = "gunicorn config.wsgi --bind 0.0.0.0:8000 --workers 2"
  worker = "celery -A config worker -l info"
  bolt   = "env DJANGO_SETTINGS_MODULE=config.settings.bolt python manage.py runbolt --port 8002"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.checks]]
    grace_period = "10s"
    interval = "10s"
    method = "GET"
    path = "/readyz"
    protocol = "http"
    timeout = "5s"
    type = "http"
