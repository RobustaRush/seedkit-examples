{% extends "base.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}
<main>
  <h1>Sign In</h1>
  <p>Enter your email address and we'll send you a magic link.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send magic link</button>
  </form>
</main>
{% endblock %}
