[tools]
python = "3.12"
uv = "latest"

[tasks.dev]
description = "Run development server"
run = "uv run manage.py runserver"

[tasks.worker]
description = "Run Celery worker"
run = "uv run celery -A config worker -l info"

[tasks.bolt]
description = "Run Bolt API server"
run = "DJANGO_SETTINGS_MODULE=config.settings.bolt uv run manage.py runbolt --dev --port 8001"

[tasks.migrate]
description = "Run database migrations"
run = "uv run manage.py migrate"

[tasks.makemigrations]
description = "Create database migrations"
run = "uv run manage.py makemigrations"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.lint]
description = "Run ruff linter"
run = "uv run ruff check ."

[tasks.typecheck]
description = "Run pyright type checker"
run = "uv run pyright"

[tasks.shell]
description = "Open Django shell"
run = "uv run manage.py shell"

[tasks.superuser]
description = "Create superuser"
run = "uv run manage.py createsuperuser"

[tasks.services]
description = "Start local services (db, redis, minio)"
run = "docker compose up -d --wait"

[tasks.services-down]
description = "Stop local services"
run = "docker compose down"
