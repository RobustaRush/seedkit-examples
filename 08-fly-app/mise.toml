[tools]
python = "3.12"

[env]
DJANGO_SETTINGS_MODULE = "config.settings.local"
_.python.venv = { path = ".venv", create = true }

[tasks.dev]
description = "Start Django dev server"
run = "uv run manage.py runserver"

[tasks.worker]
description = "Start Celery worker"
run = "uv run celery -A config worker -l info"

[tasks.bolt]
description = "Start Bolt API server (fast-path settings)"
run = "DJANGO_SETTINGS_MODULE=config.settings.bolt uv run manage.py runbolt --dev --port 8001"

[tasks.migrate]
description = "Run Django migrations"
run = "uv run manage.py migrate"

[tasks.makemigrations]
description = "Create Django migrations"
run = "uv run manage.py makemigrations"

[tasks.shell]
description = "Django shell"
run = "uv run manage.py shell"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.lint]
description = "Lint with ruff"
run = "uv run ruff check ."

[tasks.typecheck]
description = "Type check with pyright"
run = "uv run pyright"

[tasks.up]
description = "Start docker services"
run = "docker compose up -d --wait"

[tasks.down]
description = "Stop docker services"
run = "docker compose down"
