{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Shop{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
</head>
<body class="min-h-screen bg-base-100">
  <nav class="navbar bg-base-200 shadow-sm px-4">
    <div class="flex-1">
      <a href="/" class="btn btn-ghost text-xl font-bold">Shop</a>
    </div>
    <div class="flex-none gap-2">
      {% if user.is_authenticated %}
        <a href="{% url 'account_logout' %}" class="btn btn-ghost btn-sm">Sign out</a>
      {% else %}
        <a href="{% url 'account_login' %}" class="btn btn-ghost btn-sm">Sign in</a>
        <a href="{% url 'account_signup' %}" class="btn btn-primary btn-sm">Sign up</a>
      {% endif %}
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mb-4">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
