[tools]
python = "3.12"

[tasks.install]
run = "uv sync"

[tasks.dev]
run = "uv run manage.py tailwind runserver"

[tasks.migrate]
run = "uv run manage.py migrate"

[tasks.makemigrations]
run = "uv run manage.py makemigrations"

[tasks.shell]
run = "uv run manage.py shell"

[tasks.superuser]
run = "uv run manage.py createsuperuser"

[tasks.test]
run = "uv run pytest"

[tasks.lint]
run = "uv run ruff check ."

[tasks.fmt]
run = "uv run ruff format ."

[tasks.typecheck]
run = "uv run pyright"

[tasks.collectstatic]
run = "uv run manage.py collectstatic --noinput"

[tasks.tailwind]
run = "uv run manage.py tailwind runserver"
