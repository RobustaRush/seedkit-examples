[tools]
python = "3.12"
node = "lts"

[tasks.server]
run = "uv run manage.py runserver"
description = "Start development server"

[tasks.tailwind]
run = "uv run manage.py tailwind build"
description = "Build Tailwind CSS"

[tasks.tailwind-watch]
run = "uv run manage.py tailwind watch"
description = "Watch and rebuild Tailwind CSS"

[tasks.migrate]
run = "uv run manage.py migrate"
description = "Run database migrations"

[tasks.makemigrations]
run = "uv run manage.py makemigrations"
description = "Create migrations"

[tasks.test]
run = "uv run pytest"
description = "Run tests"

[tasks.lint]
run = "uv run ruff check ."
description = "Run ruff linter"

[tasks.typecheck]
run = "uv run pyright"
description = "Run type checker"

[tasks.collectstatic]
run = "uv run manage.py collectstatic --noinput"
description = "Collect static files"
