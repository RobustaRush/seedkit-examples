services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: shop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY}"
      DJANGO_ALLOWED_HOSTS: "${DOMAIN:-localhost}"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/shop_db"
      EMAIL_URL: "${EMAIL_URL:-consolemail://}"
      DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL:-noreply@example.com}"
    ports:
      - "8000:8000"

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN:-localhost}"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
