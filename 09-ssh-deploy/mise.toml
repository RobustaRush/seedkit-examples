[tools]
python = "3.12"

[tasks.server]
description = "Run development server"
run = "uv run manage.py runserver"

[tasks.worker]
description = "Run RQ worker"
run = "uv run manage.py rqworker default"

[tasks.migrate]
description = "Run migrations"
run = "uv run manage.py migrate"

[tasks.makemigrations]
description = "Make migrations"
run = "uv run manage.py makemigrations"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.lint]
description = "Lint with ruff"
run = "uv run ruff check ."

[tasks.fmt]
description = "Format with ruff"
run = "uv run ruff format ."

[tasks.shell]
description = "Django shell"
run = "uv run manage.py shell"

[tasks.dbbackup]
description = "Backup database"
run = "uv run manage.py dbbackup"

[tasks.dbrestore]
description = "Restore database"
run = "uv run manage.py dbrestore"
