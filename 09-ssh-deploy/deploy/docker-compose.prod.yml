services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: unless-stopped
    env_file: deploy/.env.prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: unless-stopped
    command: python manage.py rqworker default
    env_file: deploy/.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bugsink:
    image: bugsink/bugsink:latest
    restart: unless-stopped
    environment:
      SECRET_KEY: ${BUGSINK_SECRET_KEY}
      CREATE_SUPERUSER: "admin:${BUGSINK_ADMIN_PASSWORD}"
      BEHIND_HTTPS_PROXY: "true"
      BASE_URL: https://bugsink.example.com
    volumes:
      - bugsink_data:/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on: [umami-db]

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami_pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  bugsink_data:
  umami_pgdata:
